<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>斩仙台 · 短剧生成</title>
  <style>
    :root {
      --bg: #0c0c12;
      --panel: #16161f;
      --border: #2a2a38;
      --text: #e8e6f0;
      --muted: #8b8698;
      --accent: #c9a227;
      --accent-dim: #8a7020;
      --danger: #c44c4c;
      --ok: #3d9e6e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a1528 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin: 0 0 0.25rem;
      background: linear-gradient(135deg, #f5e6c8, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    .steps { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; font-size: 0.85rem; color: var(--muted); }
    .steps span { padding: 0.25rem 0.6rem; border-radius: 6px; background: #0f0f16; border: 1px solid var(--border); }
    .steps span.on { border-color: var(--accent); color: var(--accent); }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1rem; margin: 0 0 1rem; color: var(--muted); font-weight: 600; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="text"], select, textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f0f16;
      color: var(--text);
      font-size: 1rem;
    }
    textarea { min-height: 100px; resize: vertical; font-family: inherit; line-height: 1.45; }
    textarea.script-json {
      min-height: 320px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.8rem;
      line-height: 1.4;
    }
    input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent-dim); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
    .actions { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
    button.primary {
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(165deg, #e4c76b, var(--accent));
      color: #1a1508;
    }
    button.secondary {
      padding: 0.65rem 1.2rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .status-pill {
      font-size: 0.85rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: #0f0f16;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-pill.running { border-color: var(--accent); color: var(--accent); }
    .status-pill.done { border-color: var(--ok); color: var(--ok); }
    .status-pill.failed { border-color: var(--danger); color: var(--danger); }
    .preview {
      margin-top: 1rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      aspect-ratio: 9/16;
      max-height: 420px;
      max-width: 236px;
    }
    .preview video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .wall-section {
      margin-top: 2.25rem;
      padding: 1.35rem 1.25rem 1.5rem;
      background: linear-gradient(165deg, rgba(22, 22, 31, 0.95), rgba(15, 15, 22, 0.98));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    .wall-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem 1rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid rgba(42, 42, 56, 0.8);
    }
    .wall-head h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      background: linear-gradient(90deg, #e8e6f0, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .wall-head p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }
    @media (min-width: 900px) {
      .wall { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }
    .wall-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(15, 15, 22, 0.5);
    }
    .tile {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(42, 42, 56, 0.9);
      background: #12121a;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.28);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
      border-color: rgba(201, 162, 39, 0.35);
    }
    .tile-media {
      position: relative;
      aspect-ratio: 9 / 16;
      background: linear-gradient(160deg, #1e1c2a, #0a0a10);
      overflow: hidden;
    }
    .tile-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tile-media--video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .tile-media--empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .tile-body {
      padding: 0.75rem 0.85rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      flex: 1;
      min-height: 0;
    }
    .tile-meta-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .tile-meta-top .theme {
      flex: 1;
      min-width: 0;
      margin: 0;
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
      color: #f0eef8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
    }
    .tile-del {
      flex-shrink: 0;
      padding: 0.2rem 0.5rem;
      font-size: 0.68rem;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid rgba(196, 76, 76, 0.45);
      background: transparent;
      color: #c98a8a;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tile-del:hover {
      background: rgba(196, 76, 76, 0.2);
      color: #ffb4b4;
      border-color: var(--danger);
    }
    .tile-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.5rem;
    }
    .tile-tag {
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(42, 42, 56, 0.7);
    }
    .tile-tag--accent {
      color: var(--accent);
      border-color: rgba(201, 162, 39, 0.35);
      background: rgba(201, 162, 39, 0.08);
    }
    .tile-status {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }
    .tile-status--ok { color: var(--ok); background: rgba(61, 158, 110, 0.12); }
    .tile-status--fail { color: #e07070; background: rgba(196, 76, 76, 0.12); }
    .tile-status--wait { color: var(--accent); background: rgba(201, 162, 39, 0.1); }
    .err { color: var(--danger); font-size: 0.88rem; margin-top: 0.5rem; }
    .warn { color: #c9a227; font-size: 0.88rem; margin-top: 0.5rem; line-height: 1.45; }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>短剧生成</h1>
    <p class="sub">
      ① 填写主题、风格与<strong>故事简介</strong> → 生成剧本<br />
      ② 在文本框中<strong>自由编辑</strong>分镜 JSON → 生成视频<br />
      ③ 下方为历史视频墙
    </p>

    <div class="steps">
      <span class="on" id="stepLabel1">1 剧本</span>
      <span id="stepLabel2">2 编辑 & 出片</span>
    </div>

    <div class="card">
      <h2>① 输入与故事简介</h2>
      <div class="row">
        <div>
          <label for="theme">主题</label>
          <input id="theme" type="text" placeholder="如：斩仙台复仇" value="斩仙台复仇" />
        </div>
        <div>
          <label for="style">风格</label>
          <select id="style">
            <option value="爽文" selected>爽文</option>
            <option value="黑暗">黑暗</option>
            <option value="反转">反转</option>
            <option value="打脸">打脸</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:1rem;">
        <div>
          <label for="duration">目标时长（秒）</label>
          <select id="duration">
            <option value="30">30</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
      </div>
      <div style="margin-top:1rem;">
        <label for="synopsis">故事简介</label>
        <textarea id="synopsis" placeholder="写清人物关系、核心矛盾、你想要的结局或名场面。大模型会据此写分镜。"></textarea>
        <p class="hint">简介越具体，剧本越贴你的设想；留空则由模型在题材下自由发挥。</p>
      </div>
      <div class="actions">
        <button class="primary" type="button" id="btnDraft">生成剧本</button>
      </div>
      <p class="err" id="errDraft" style="display:none;"></p>
    </div>

    <div class="card">
      <h2>② 编辑剧本（JSON）并生成视频</h2>
      <p class="hint">可直接改 time / scene / camera / dialogue / emotion / role；须为合法 JSON 数组。</p>
      <textarea id="scriptJson" class="script-json" placeholder='点击上方「生成剧本」后，此处会出现分镜 JSON…'></textarea>
      <div class="actions">
        <button class="primary" type="button" id="btnVideo" disabled>生成视频</button>
        <button class="secondary" type="button" id="btnFormat">格式化 JSON</button>
        <span class="status-pill" id="pill">就绪</span>
      </div>
      <p class="err" id="errVideo" style="display:none;"></p>
      <div class="preview" id="previewWrap" style="display:none;">
        <video id="player" controls playsinline></video>
      </div>
    </div>

    <section class="wall-section" aria-label="历史成片">
      <div class="wall-head">
        <h2>视频墙 · 历史</h2>
        <p id="wallHint">最近生成的短视频与状态</p>
      </div>
      <div class="wall" id="wall"></div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setPill(text, cls) {
      const pill = $("pill");
      pill.textContent = text;
      pill.className = "status-pill" + (cls ? " " + cls : "");
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    /** 解析 FastAPI HTTPException：detail 可为字符串或 { message, error, script } */
    async function readApiError(res) {
      const t = await res.text();
      try {
        const j = JSON.parse(t);
        const d = j.detail;
        if (d && typeof d === "object" && d.message != null) return String(d.message);
        if (typeof d === "string") return d;
      } catch (_) {}
      return t || res.statusText;
    }

    function fmtWallTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleString("zh-CN", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function wallStatusUi(status) {
      const map = {
        completed: { cls: "tile-status--ok", label: "已完成" },
        failed: { cls: "tile-status--fail", label: "失败" },
        running: { cls: "tile-status--wait", label: "生成中" },
        pending: { cls: "tile-status--wait", label: "排队中" },
      };
      const m = map[status] || { cls: "tile-status--wait", label: status || "—" };
      return `<span class="tile-status ${m.cls}">${escapeHtml(m.label)}</span>`;
    }

    async function loadHistory() {
      const res = await fetch("/api/history?limit=40");
      if (!res.ok) return;
      const items = await res.json();
      const hint = $("wallHint");
      if (hint) hint.textContent = items.length ? `共 ${items.length} 条` : "暂无记录";
      if (!items.length) {
        $("wall").innerHTML =
          '<div class="wall-empty">还没有成片。完成一次「生成视频」后，会在这里显示预览与播放。</div>';
        return;
      }
      $("wall").innerHTML = items
        .map((v) => {
          const vid = v.video_url || "";
          const when = fmtWallTime(v.created_at);
          let media;
          if (vid && v.status === "completed") {
            media = `<div class="tile-media tile-media--video"><video src="${vid}" controls playsinline preload="metadata"></video></div>`;
          } else {
            const label =
              v.status === "failed"
                ? "生成失败"
                : v.status === "running"
                  ? "生成中…"
                  : v.status === "pending"
                    ? "排队中"
                    : "暂无成片";
            media = `<div class="tile-media tile-media--empty">${escapeHtml(label)}</div>`;
          }
          return `
          <article class="tile">
            ${media}
            <div class="tile-body">
              <div class="tile-meta-top">
                <h3 class="theme">${escapeHtml(v.theme)}</h3>
                <button type="button" class="tile-del" data-job-id="${escapeHtml(v.job_id)}" title="删除此条与成片文件">删除</button>
              </div>
              <div class="tile-row">
                <span class="tile-tag tile-tag--accent">${escapeHtml(v.style)}</span>
                <span class="tile-tag">${v.duration}s</span>
                ${when ? `<span class="tile-tag">${escapeHtml(when)}</span>` : ""}
                ${wallStatusUi(v.status)}
              </div>
            </div>
          </article>`;
        })
        .join("");
    }

    $("wall").addEventListener("click", async (e) => {
      const btn = e.target.closest(".tile-del");
      if (!btn) return;
      e.preventDefault();
      const jid = btn.getAttribute("data-job-id");
      if (!jid) return;
      if (!confirm("确定从视频墙删除？数据库记录与服务器上的成片目录将一并删除。")) return;
      try {
        const res = await fetch("/api/history/" + encodeURIComponent(jid), { method: "DELETE" });
        if (!res.ok) {
          alert(await readApiError(res));
          return;
        }
        const pv = $("player");
        if (pv && pv.src && pv.src.indexOf(jid) !== -1) {
          pv.removeAttribute("src");
          $("previewWrap").style.display = "none";
        }
        loadHistory();
      } catch (err) {
        alert(String(err));
      }
    });

    let pollTimer = null;
    function poll(jobId, delayMs = 2000) {
      if (pollTimer) clearTimeout(pollTimer);
      pollTimer = setTimeout(async () => {
        try {
          const res = await fetch("/api/status/" + encodeURIComponent(jobId));
          const data = await res.json();
          if (data.status === "done") {
            setPill("完成", "done");
            $("btnVideo").disabled = false;
            if (data.video_url) {
              $("player").src = data.video_url;
              $("previewWrap").style.display = "block";
            }
            $("stepLabel2").classList.add("on");
            loadHistory();
            return;
          }
          if (data.status === "failed") {
            setPill("失败", "failed");
            $("btnVideo").disabled = false;
            $("errVideo").style.display = "block";
            $("errVideo").textContent = data.error || "生成失败";
            loadHistory();
            return;
          }
          setPill(data.status === "running" ? "渲染中…" : "排队中", "running");
          poll(jobId, 2000);
        } catch (e) {
          setPill("错误", "failed");
          $("btnVideo").disabled = false;
          $("errVideo").style.display = "block";
          $("errVideo").textContent = String(e);
        }
      }, delayMs);
    }

    $("btnDraft").onclick = async () => {
      $("errDraft").style.display = "none";
      $("btnDraft").disabled = true;
      const theme = $("theme").value.trim() || "斩仙台复仇";
      const style = $("style").value;
      const duration = parseInt($("duration").value, 10);
      const synopsis = $("synopsis").value.trim();
      try {
        const res = await fetch("/api/script/draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ theme, style, duration, synopsis }),
        });
        if (!res.ok) {
          throw new Error(await readApiError(res));
        }
        const data = await res.json();
        $("scriptJson").value = JSON.stringify(data.script, null, 2);
        $("btnVideo").disabled = false;
        $("stepLabel2").classList.add("on");
        if (data.fallback) {
          $("errDraft").className = "warn";
          $("errDraft").style.display = "block";
          $("errDraft").textContent =
            "大模型不可用，已填入兜底分镜模板，请修改后再生成视频。" +
            (data.message ? " 原因：" + data.message : "") +
            (data.error_code ? " [" + data.error_code + "]" : "");
        } else {
          $("errDraft").style.display = "none";
          $("errDraft").className = "err";
        }
      } catch (e) {
        $("errDraft").className = "err";
        $("errDraft").style.display = "block";
        $("errDraft").textContent = String(e);
      } finally {
        $("btnDraft").disabled = false;
      }
    };

    $("btnFormat").onclick = () => {
      $("errVideo").style.display = "none";
      try {
        const parsed = JSON.parse($("scriptJson").value);
        $("scriptJson").value = JSON.stringify(parsed, null, 2);
      } catch (e) {
        $("errVideo").style.display = "block";
        $("errVideo").textContent = "JSON 格式错误：" + e.message;
      }
    };

    $("btnVideo").onclick = async () => {
      $("errVideo").style.display = "none";
      let script;
      try {
        script = JSON.parse($("scriptJson").value);
        if (!Array.isArray(script) || script.length === 0) throw new Error("剧本须为非空数组");
      } catch (e) {
        $("errVideo").style.display = "block";
        $("errVideo").textContent = "请先「生成剧本」或修正 JSON：" + e.message;
        return;
      }
      $("btnVideo").disabled = true;
      setPill("提交中…", "running");
      const theme = $("theme").value.trim() || "斩仙台复仇";
      const style = $("style").value;
      const duration = parseInt($("duration").value, 10);
      try {
        const res = await fetch("/api/generate_video", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ theme, style, duration, script }),
        });
        if (!res.ok) {
          throw new Error(await readApiError(res));
        }
        const data = await res.json();
        setPill("排队 / 渲染中", "running");
        poll(data.job_id, 0);
      } catch (e) {
        setPill("失败", "failed");
        $("btnVideo").disabled = false;
        $("errVideo").style.display = "block";
        $("errVideo").textContent = String(e);
      }
    };

    loadHistory();
  </script>
</body>
</html>
